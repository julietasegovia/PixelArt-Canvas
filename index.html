<!DOCTYPE html>
<html lang="eng">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale = 1.0, maximum-scale = 1.0, user-scalable =yes">
        <title>Pixel Canvas</title>
        <link rel="stylesheet" href="pixelart.css">
    </head>
    <body>
        <h1>Draw something beautiful</h1>
        <br>
        <div class="canvas" id="canvas"></div>
        <div id="modifiers">
            <button id="reset-canvas">Restart</button>
            <button id="set-eraser">Eraser</button>
            <div id="colorer">
                <input type="color" id="chosen-color" value="#ff0000">
                <button id="pick-color" onclick="showColor()">Change Color</button>
            </div>
        </div>
    </body>
    <script src="pixelart.js"></script>
</html>
